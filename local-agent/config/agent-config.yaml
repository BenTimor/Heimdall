server:
  host: "127.0.0.1"
  port: 8443
  ca_cert: "../proxy-server/certs/tunnel.crt"

auth:
  machine_id: "dev-machine-01"
  token: "secret-token"

local_proxy:
  port: 19080
  host: "127.0.0.1"

health:
  port: 19876
  host: "127.0.0.1"

reconnect:
  initial_delay_ms: 1000
  max_delay_ms: 60000
  multiplier: 2.0

logging:
  level: "info"

transparent:
  enabled: true
  method: "windivert"