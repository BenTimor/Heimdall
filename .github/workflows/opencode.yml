name: opencode

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

jobs:
  opencode:
    if: |
      contains(github.event.comment.body, ' /oc') ||
      startsWith(github.event.comment.body, '/oc') ||
      contains(github.event.comment.body, ' /opencode') ||
      startsWith(github.event.comment.body, '/opencode')
    runs-on:
      - self-hosted
      - linux
      - x64
      - heimdall-demo
    permissions:
      id-token: write
      contents: read
      pull-requests: read
      issues: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Validate runner-hosted Heimdall service
        shell: bash
        run: |
          curl --silent --fail http://127.0.0.1:19876/health > /dev/null

      - name: Run opencode
        uses: anomalyco/opencode/github@latest
        env:
          OPENROUTER_API_KEY: __OPENROUTER_API_KEY__
        with:
          model: openrouter/x-ai/grok-code-fast-1

          share: "false"

      - name: Print Heimdall service status on failure
        if: failure()
        shell: bash
        run: |
          systemctl status heimdall-agent --no-pager || true
          journalctl -u heimdall-agent -n 200 --no-pager || true
